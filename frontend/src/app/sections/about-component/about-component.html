<section class="about">
  <h2>{{ 'ABOUT' | translate }}</h2>
  <div class="about_container">
    <div class="about_text">
      <hr />
      <p>{{ 'ABOUT_DESC_1' | translate }}</p>
      <p>{{ 'ABOUT_DESC_2' | translate }}</p>
      <p>{{ 'ABOUT_DESC_3' | translate }}</p>
      <p>{{ 'ABOUT_DESC_4' | translate }}</p>
      <hr />
      <div class="about_tags">
        @for (tag of skills(); track tag) {
          <span class="about_tag">{{ tag }}</span>
        }
      </div>
    </div>
    <div class="about_photo">
      <picture>
        <source srcset="assets/caricature/caricature.avif" type="image/avif" />
        <source srcset="assets/caricature/caricature.webp" type="image/webp" />
        <img src="assets/caricature/caricature.png" alt="Caricature of Diego" width="400" height="600" loading="lazy" decoding="async" />
      </picture>
    </div>
  </div>
</section>
