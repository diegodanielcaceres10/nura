<section class="home">
  <div class="home_wave"></div>
  <div class="home_wave"></div>
  <div class="home_wave"></div>
  <div class="home_container">
    <div class="home_info">
      <div class="home_logo">
        <img src="assets/diegodanielcaceres.png" width="512" height="130" alt="Diego Daniel Caceres Logo" decoding="async" />
      </div>
      <span class="home_subtitle">{{ 'HOME_SUBTITLE' | translate }}</span>
      <div class="home_buttons">
        <button (click)="openCV()" class="home_button home_button-alt" type="button">
          {{ 'HOME_DOWNLOAD_CV' | translate }}
          <div class="home_icon">
            <i class="fa-solid fa-cloud-arrow-down"></i>
          </div>
        </button>
        <a [routerLink]="[]" fragment="contact" class="home_button" role="button">
          {{ 'HOME_CONTACT' | translate }}
          <div class="home_icon">
            <i class="fa-solid fa-arrow-right"></i>
          </div>
        </a>
      </div>
    </div>
    <div class="home_scroll">
      <a [routerLink]="[]" fragment="about" aria-label="Go to About section"><i class="fa-solid fa-circle-down"></i></a>
    </div>
  </div>
</section>
