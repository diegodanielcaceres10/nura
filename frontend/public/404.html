<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404</title>
    <link rel="stylesheet" href="style-shell.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .not-found-shell {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100vh;
      }

      .spinner-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 64px;
        height: 64px;
        border-radius: 999px;
        text-decoration: none;
      }

      .spinner {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: 4px solid rgba(125, 212, 216, 0.3);
        border-top-color: var(--palette-accent-light);
        animation: spin 0.9s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <script>
      (function () {
        function setManualLink() {
          var basePath = '/nura/';
          var path = window.location.pathname;
          var relative = path.indexOf(basePath) === 0 ? path.slice(basePath.length) : path.slice(1);
          var target = window.location.origin + basePath + '?p=/' + encodeURIComponent(relative);

          if (window.location.search) {
            target += '&' + window.location.search.slice(1);
          }

          if (window.location.hash) {
            target += window.location.hash;
          }

          var manualLink = document.getElementById('manual-continue');
          if (manualLink) {
            manualLink.setAttribute('href', target);
          }

          // Automatic redirect after 5 seconds, preserving the requested path
          window.setTimeout(function () {
            window.location.href = target;
          }, 5000);
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', setManualLink);
        } else {
          setManualLink();
        }
      })();
    </script>
  </head>
  <body>
    <main
      class="not-found-shell"
      role="status"
      aria-live="polite"
      aria-label="Redirigiendo a la aplicación"
    >
      <a id="manual-continue" class="spinner-link" href="/nura/">
        <div class="spinner" aria-hidden="true"></div>
      </a>
    </main>
  </body>
</html>
