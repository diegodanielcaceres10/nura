<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Nura | Diego Daniel Caceres</title>
    <base href="/nura/" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Technical portfolio of Diego Daniel Caceres, Senior Full Stack Developer and Tech Lead focused on Angular, React, and Node.js." />
    <meta name="keywords" content="Full Stack Developer, Angular, React, Tech Lead, Diego Caceres, Portfolio" />
    <meta name="robots" content="index,follow" />
    <meta name="theme-color" content="#07152a" />
    <meta property="og:title" content="Diego Daniel Caceres - Full Stack Developer" />
    <meta property="og:description" content="Technical portfolio of Diego Daniel Caceres, Senior Full Stack Developer and Tech Lead." />
    <meta property="og:url" content="https://diegodanielcaceres10.github.io/nura/" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://diegodanielcaceres10.github.io/nura/favicon-180x180.png" />
    <link rel="stylesheet" href="style-shell.css" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
    <link rel="apple-touch-icon" href="favicon-180x180.png" />
    <style>
      /* Shared shell styles for Nura app and 404 page */

      :root {
        /* Palette */
        --palette-bg-deepest: #07152a;
        --palette-bg-primary: #0a1f44;
        --palette-bg-mid: #1a1530;

        --palette-accent-purple: #521f57;
        --palette-accent-blue: #2cabb3;
        --palette-accent-light: #7dd4d8;

        --palette-lavender: #d8c6e1;
        --palette-text-muted: #8fa3b8;
        --palette-white: #ffffff;

        /* Semantic background */
        --bg-app: var(--palette-bg-deepest);
        --bg-card: var(--palette-bg-primary);
        --bg-card-alt: var(--palette-bg-mid);

        /* Semantic text */
        --text-primary: var(--palette-accent-light);
        --text-secondary: var(--palette-text-muted);
        --text-muted: var(--palette-text-muted);
        --text-on-action: var(--palette-white);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at top, #0a1f44 0%, #07152a 55%, #000000 100%);
        color: var(--text-on-action);
        display: flex;
        font-family:
          'Google Sans',
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .not-found-shell {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100vh;
      }

      .spinner-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 64px;
        height: 64px;
        border-radius: 999px;
        text-decoration: none;
      }

      .spinner {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: 4px solid rgba(125, 212, 216, 0.3);
        border-top-color: var(--palette-accent-light);
        animation: spin 0.9s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <script>
      (function () {
        function setManualLink() {
          var basePath = '/nura/';
          var target = window.location.origin + basePath + 'es';

          var manualLink = document.getElementById('manual-continue');
          if (manualLink) {
            manualLink.setAttribute('href', target);
          }

          window.setTimeout(function () {
            window.location.href = target;
          }, 1000);
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', setManualLink);
        } else {
          setManualLink();
        }
      })();
    </script>
  </head>
  <body>
    <main class="not-found-shell" role="status" aria-live="polite" aria-label="Redirigiendo a la aplicación">
      <a id="manual-continue" class="spinner-link" href="/nura/">
        <div class="spinner" aria-hidden="true"></div>
      </a>
    </main>
  </body>
</html>
